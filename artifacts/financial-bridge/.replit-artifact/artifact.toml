kind = "web"
previewPath = "/"
title = "Financial Bridge Page"
version = "1.0.0"
id = "artifacts/financial-bridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21850

[services.development]
run = "pnpm --filter @workspace/financial-bridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financial-bridge", "run", "build" ]
publicDir = "artifacts/financial-bridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21850"
BASE_PATH = "/"
